# Destination in your repo: docs/okf-map.yml
#
# Map source areas to the specs and ADRs that govern them. The `scripts/okf
# check-stale` command uses this file to catch cases where source changed but
# the mapped knowledge file was not touched.
#
# Keep patterns repo-relative. Quote glob patterns so YAML readers do not treat
# `*` as an alias marker.
#
# Convention here: map each module (and its tests) to the spec that states its
# contract; ADRs are mapped only from the files that embody the decision, so a
# routine code change doesn't demand an ADR touch.

mappings:
  # Configuration contract
  - source: "skywatch/config.py"
    docs:
      - "docs/specs/config.md"
  - source: "skywatch/__main__.py"
    docs:
      - "docs/specs/config.md"
      - "docs/specs/operations.md"
  - source: "tests/test_config.py"
    docs:
      - "docs/specs/config.md"
  - source: "tests/test_startup.py"
    docs:
      - "docs/specs/config.md"

  # Sources: fetch -> normalize -> store -> cycle
  - source: "skywatch/fetch.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/adr/0002-pass-and-weather-sources.md"
  - source: "skywatch/sources.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/adr/0002-pass-and-weather-sources.md"
  - source: "skywatch/cycle.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/specs/verdict-digest.md"
      - "docs/specs/operations.md"
  - source: "skywatch/model.py"
    docs:
      - "docs/specs/sources.md"
  - source: "skywatch/db.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/specs/verdict-digest.md"
      - "docs/specs/status-page.md"
      - "docs/specs/operations.md"
      - "docs/adr/0003-sqlite-persistence.md"
  - source: "tests/fixtures/**"
    docs:
      - "docs/specs/sources.md"
      - "docs/adr/0002-pass-and-weather-sources.md"
  - source: "tests/test_fetch.py"
    docs:
      - "docs/specs/sources.md"
  - source: "tests/test_sources.py"
    docs:
      - "docs/specs/sources.md"
  - source: "tests/test_db.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/specs/operations.md"
  - source: "tests/test_cycle.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/specs/verdict-digest.md"
      - "docs/specs/operations.md"
  - source: "tests/test_model.py"
    docs:
      - "docs/specs/sources.md"
  - source: "tests/support.py"
    docs:
      - "docs/specs/sources.md"
      - "docs/specs/verdict-digest.md"

  # Verdict and digest
  - source: "skywatch/verdict.py"
    docs:
      - "docs/specs/verdict-digest.md"
  - source: "skywatch/digest.py"
    docs:
      - "docs/specs/verdict-digest.md"
      - "docs/specs/operations.md"
  - source: "skywatch/notify.py"
    docs:
      - "docs/specs/verdict-digest.md"
      - "docs/adr/0004-smtp-digest-transport.md"
  - source: "tests/test_verdict.py"
    docs:
      - "docs/specs/verdict-digest.md"
  - source: "tests/test_digest.py"
    docs:
      - "docs/specs/verdict-digest.md"
  - source: "tests/test_notify.py"
    docs:
      - "docs/specs/verdict-digest.md"
  - source: "tests/smtp_capture.py"
    docs:
      - "docs/adr/0004-smtp-digest-transport.md"
  - source: "scripts/demo_digest.py"
    docs:
      - "docs/adr/0004-smtp-digest-transport.md"
  - source: "tests/test_demo.py"
    docs:
      - "docs/adr/0004-smtp-digest-transport.md"

  # Operations: scheduler, trigger, retention
  - source: "skywatch/scheduler.py"
    docs:
      - "docs/specs/operations.md"
  - source: "tests/test_scheduler.py"
    docs:
      - "docs/specs/operations.md"

  # Status page
  - source: "skywatch/page.py"
    docs:
      - "docs/specs/status-page.md"
  - source: "tests/test_page.py"
    docs:
      - "docs/specs/status-page.md"

  # Stack decision (ADR-0001): the files that embody it
  - source: "skywatch/server.py"
    docs:
      - "docs/specs/status-page.md"
      - "docs/specs/operations.md"
      - "docs/adr/0001-python-stdlib-stack.md"
  - source: "skywatch/__init__.py"
    docs:
      - "docs/adr/0001-python-stdlib-stack.md"
  - source: "tests/test_server.py"
    docs:
      - "docs/specs/status-page.md"
      - "docs/specs/operations.md"
      - "docs/adr/0001-python-stdlib-stack.md"
  - source: "Makefile"
    docs:
      - "docs/adr/0001-python-stdlib-stack.md"
